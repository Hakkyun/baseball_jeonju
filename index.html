<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>
  (function() {
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>학균 야구 허브</title>
<style>
/* ── index 전용 ── */
.header { margin-bottom: 20px; }
.subtitle { letter-spacing: 0.1em; margin-bottom: 6px; }

.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cal-title { font-size: 13px; font-weight: 500; color: var(--text); }
.cal-link { font-size: 11px; color: var(--text3); cursor: pointer; text-decoration: none; }
.cal-link:hover { color: var(--text2); }
.cal-days-label { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 6px; }
.cal-days-label span { font-size: 10px; color: var(--text3); }
.cal-days-label span.sun { color: var(--pink); }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
.cal-day { font-size: 12px; color: var(--text3); padding: 5px 0; }
.cal-day.today {
  background: var(--mint); color: var(--bg);
  font-weight: 600; border-radius: 50%;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center; margin: 0 auto;
}
.cal-day.game-day {
  border: 1.5px solid var(--pink); color: var(--pink);
  font-weight: 600; border-radius: 50%;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center; margin: 0 auto;
}
.cal-divider { height: 0.5px; background: var(--border); margin: 12px 0; }
.next-game { display: flex; justify-content: space-between; align-items: center; }
.next-game-info { }
.next-game-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 3px; }
.next-game-main { font-size: 13px; font-weight: 500; color: var(--pink); margin-bottom: 2px; }
.next-game-sub { font-size: 11px; color: var(--text3); }
.dday-badge {
  background: rgba(255,79,123,0.15); border: 0.5px solid rgba(255,79,123,0.3);
  border-radius: 20px; padding: 6px 14px;
  font-size: 15px; font-weight: 500; color: var(--pink);
}

.routine-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 10px; }
.routine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.routine-item {
  background: var(--bg3); border-radius: 10px; padding: 10px 12px;
  cursor: pointer; transition: background 0.15s; border: 0.5px solid transparent;
}
.routine-item:hover { border-color: rgba(61,214,163,0.3); }
.routine-item p { font-size: 13px; color: var(--text); margin: 0; }
.routine-hint { font-size: 10px; color: var(--text3); margin-top: 8px; }

.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.menu-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 14px; padding: 16px 14px;
  cursor: pointer; text-decoration: none; display: block; transition: background 0.15s;
}
.menu-card:hover { background: var(--bg3); }
.menu-card.mint   { border-color: rgba(61,214,163,0.4); }
.menu-card.yellow { border-color: rgba(255,214,0,0.4); }
.menu-card.gray   { border-color: var(--border); }
.menu-card.pink   { border-color: rgba(255,79,123,0.4); }
.menu-tag { font-size: 10px; letter-spacing: 0.08em; margin-bottom: 10px; }
.menu-tag.mint   { color: var(--mint); }
.menu-tag.yellow { color: var(--yellow); }
.menu-tag.gray   { color: var(--text2); }
.menu-tag.pink   { color: var(--pink); }
.menu-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.menu-desc { font-size: 11px; color: var(--text3); }

.season-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; text-decoration: none;
}
.season-card:hover { background: var(--bg3); }
.season-stats { display: flex; gap: 16px; }
.season-item { text-align: center; }
.season-val { font-size: 15px; font-weight: 500; color: var(--text); }
.season-val.mint   { color: var(--mint); }
.season-val.yellow { color: var(--yellow); }
.season-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
.season-link { font-size: 11px; color: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <p class="subtitle">변학균 No.41 · 전주 라이징스타</p>
  <div class="title-row">
    <h1 class="title">학균 야구 허브</h1>
    <div class="dots">
      <div class="dot dot-mint"></div>
      <div class="dot dot-pink"></div>
      <div class="dot dot-yellow"></div>
    </div>
  </div>
  <div class="gradient-bar"></div>
</div>

<!-- 달력 카드 -->
<div class="card" id="cal-card">
  <div class="cal-header">
    <span class="cal-title" id="cal-title"></span>
    <a class="cal-link" href="schedule.html">전체 일정 보기 →</a>
  </div>
  <div class="cal-days-label">
    <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span class="sun">일</span>
  </div>
  <div class="cal-days" id="cal-days"></div>
  <div class="cal-divider"></div>
  <div class="next-game">
    <div class="next-game-info">
      <p class="next-game-label" id="next-label"></p>
      <p class="next-game-main" id="next-main"></p>
      <p class="next-game-sub" id="next-sub"></p>
    </div>
    <div class="dday-badge" id="dday-badge"></div>
  </div>
</div>

<!-- 오늘 루틴 -->
<div class="card" id="routine-card">
  <p class="routine-label" id="routine-label"></p>
  <div class="routine-grid" id="routine-grid"></div>
  <p class="routine-hint">눌러서 상세 보기</p>
</div>

<!-- 메뉴 -->
<div class="menu-grid">
  <a class="menu-card mint" href="warmup.html">
    <p class="menu-tag mint">경기장</p>
    <p class="menu-name">워밍업</p>
    <p class="menu-desc">선발 루틴</p>
  </a>
  <a class="menu-card yellow" href="weekly.html">
    <p class="menu-tag yellow">상시</p>
    <p class="menu-name">주간 루틴</p>
    <p class="menu-desc">요일별 훈련</p>
  </a>
</div>
<div class="menu-grid">
  <a class="menu-card gray" href="gamelog.html" style="border-color:rgba(240,240,240,0.2);">
    <p class="menu-tag gray">집 · 여유있을 때</p>
    <p class="menu-name">경기일지</p>
    <p class="menu-desc">기록 + 피드백</p>
  </a>
  <a class="menu-card pink" href="training.html">
    <p class="menu-tag pink">집 · 연습장</p>
    <p class="menu-name">연습 정보</p>
    <p class="menu-desc">타격 기본기</p>
  </a>
</div>

<!-- 시즌 요약 -->
<a class="season-card" href="gamelog.html" id="season-card">
  <div style="flex:1;">
    <div id="season-stats-p"></div>
    <div style="height:0.5px;background:var(--border);margin:8px 0;"></div>
    <div id="season-stats-b"></div>
  </div>
  <span class="season-link" style="align-self:center;">경기일지 →</span>
</a>

<!-- 팝업 -->
<div class="popup-overlay" id="popup" onclick="closePopup(event)">
  <div class="popup-box">
    <p class="popup-name" id="popup-name"></p>
    <p class="popup-sets" id="popup-sets"></p>
    <div class="popup-points" id="popup-points"></div>
    <p class="popup-close" onclick="document.getElementById('popup').classList.remove('open')">닫기</p>
  </div>
</div>

<script>
const DAY_MAP = { 0: '일', 1: '월', 2: '화', 3: '수', 4: '목', 5: '금', 6: '토' };
const DAY_ORDER = ['월','화','수','목','금','토','일'];

async function loadJSON(path) {
  const res = await fetch(path);
  return res.json();
}

function formatTime(t) {
  const [h, m] = t.split(':');
  const hour = parseInt(h);
  return `${hour < 12 ? '오전' : '오후'} ${hour <= 12 ? hour : hour - 12}시${m !== '00' ? ' ' + m + '분' : ''}`;
}

function getDday(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00'); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function getWeekRange() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0=일
  // 월요일 기준으로 주 시작
  const diff = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(today); mon.setDate(today.getDate() + diff);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(d);
  }
  return days;
}

function renderCalendar(schedule) {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = getWeekRange();
  const mon = days[0]; const sun = days[6];

  // 주차 표시
  const fmt = d => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('cal-title').textContent =
    `${today.getMonth()+1}월 · ${fmt(mon)} — ${fmt(sun)}`;

  // 날짜 렌더
  const gameDates = schedule.map(g => g.date);
  const calEl = document.getElementById('cal-days');
  calEl.innerHTML = days.map(d => {
    const isToday = d.getTime() === today.getTime();
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isGame = gameDates.includes(dateStr);
    if (isToday) return `<div class="cal-day today">${d.getDate()}</div>`;
    if (isGame) return `<div class="cal-day game-day">${d.getDate()}</div>`;
    return `<div class="cal-day">${d.getDate()}</div>`;
  }).join('');

  // 다음 경기
  const upcoming = schedule
    .filter(g => g.status === 'upcoming')
    .sort((a,b) => a.date.localeCompare(b.date));
  if (upcoming.length > 0) {
    const next = upcoming[0];
    const dday = getDday(next.date);
    const myTeam = '라이징스타';
    const isHome = next.home === myTeam;
    const opponent = isHome ? next.away : next.home;
    const [y,m,d] = next.date.split('-');
    const dateLabel = `${m}.${d} 일요일`;

    document.getElementById('next-label').textContent = `${dateLabel}`;
    document.getElementById('next-main').textContent = `vs ${opponent} · ${formatTime(next.time)}`;
    document.getElementById('next-sub').textContent = `${next.venue} · ${isHome ? '홈' : '원정'}`;
    document.getElementById('dday-badge').textContent = dday === 0 ? 'D-DAY' : `D-${dday}`;
  }
}

function renderRoutine(routine) {
  const today = new Date();
  const dayKey = DAY_MAP[today.getDay()];
  const data = routine[dayKey];

  document.getElementById('routine-label').textContent =
    `오늘 루틴 · ${dayKey}요일${data?.note ? ' · ' + data.note : ''}`;

  const grid = document.getElementById('routine-grid');
  if (!data || !data.items.length) {
    grid.innerHTML = `<p style="font-size:13px;color:var(--text3);grid-column:span 2;">오늘은 루틴이 없어요 😴</p>`;
    return;
  }
  grid.innerHTML = data.items.map((item, i) => `
    <div class="routine-item" onclick="openPopup(${i})">
      <p>${item.name}</p>
    </div>
  `).join('');

  window._routineItems = data.items;
}

function fmtRate(v) {
  if (v===null||v===undefined||isNaN(v)) return '-';
  return v.toFixed(3).replace(/^0/,'');
}

function renderSeason(games) {
  // 투수 누적
  const pg = games.filter(g=>g.pitching);
  const tO = pg.reduce((s,g)=>s+(g.pitching.outs||0),0);
  const tER = pg.reduce((s,g)=>s+(g.pitching.er||0),0);
  const tSO = pg.reduce((s,g)=>s+(g.pitching.so||0),0);
  const W = pg.filter(g=>g.pitching.decision==='W').length;
  const L = pg.filter(g=>g.pitching.decision==='L').length;
  const S = pg.filter(g=>g.pitching.decision==='S').length;
  const iv = tO/3;
  const era = iv>0?(tER/iv*7):null;
  const eraFmt = era!==null?era.toFixed(2):'-';
  const eraC = era!==null?(era<=5?'var(--mint)':era<=8?'var(--yellow)':'var(--pink)'):'var(--text)';
  const innFmt = `${Math.floor(tO/3)}.${tO%3}`;

  document.getElementById('season-stats-p').innerHTML = `
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;">
      <span style="font-size:9px;color:var(--mint);letter-spacing:0.06em;border:0.5px solid rgba(61,214,163,0.3);border-radius:10px;padding:1px 6px;">투수</span>
    </div>
    <div class="season-stats">
      <div class="season-item"><div class="season-val" style="font-size:13px;">${W}-${L}-${S}</div><div class="season-lbl">승-패-세</div></div>
      <div class="season-item"><div class="season-val">${innFmt}</div><div class="season-lbl">이닝</div></div>
      <div class="season-item"><div class="season-val" style="color:${eraC};">${eraFmt}</div><div class="season-lbl">ERA</div></div>
      <div class="season-item"><div class="season-val" style="color:var(--mint);">${tSO}</div><div class="season-lbl">삼진</div></div>
    </div>
  `;

  // 타자 누적
  const bg = games.filter(g=>g.batting);
  const tAB = bg.reduce((s,g)=>s+(g.batting.ab||0),0);
  const tH = bg.reduce((s,g)=>s+(g.batting.hit||0),0);
  const tRBI = bg.reduce((s,g)=>s+(g.batting.rbi||0),0);
  const tBB = bg.reduce((s,g)=>s+(g.batting.bb||0),0);
  const tHBP = bg.reduce((s,g)=>s+(g.batting.hbp||0),0);
  const t2B = bg.reduce((s,g)=>s+(g.batting.d||0),0);
  const t3B = bg.reduce((s,g)=>s+(g.batting.t||0),0);
  const tHR = bg.reduce((s,g)=>s+(g.batting.hr||0),0);
  const avg = tAB>0?tH/tAB:null;
  const obp = (tAB+tBB+tHBP)>0?(tH+tBB+tHBP)/(tAB+tBB+tHBP):null;
  const tb = tH+t2B+t3B*2+tHR*3;
  const slg = tAB>0?tb/tAB:null;
  const avgC = avg===null?'var(--text)':avg>=0.400?'var(--mint)':avg>=0.300?'var(--yellow)':'var(--pink)';
  const obpC = obp===null?'var(--text)':obp>=0.500?'var(--mint)':obp>=0.400?'var(--yellow)':'var(--pink)';

  document.getElementById('season-stats-b').innerHTML = `
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;">
      <span style="font-size:9px;color:var(--yellow);letter-spacing:0.06em;border:0.5px solid rgba(255,214,0,0.3);border-radius:10px;padding:1px 6px;">타자</span>
    </div>
    <div class="season-stats">
      <div class="season-item"><div class="season-val" style="color:${avgC};">${fmtRate(avg)}</div><div class="season-lbl">타율</div></div>
      <div class="season-item"><div class="season-val" style="color:${obpC};">${fmtRate(obp)}</div><div class="season-lbl">출루율</div></div>
      <div class="season-item"><div class="season-val">${tRBI}</div><div class="season-lbl">타점</div></div>
      <div class="season-item"><div class="season-val">${bg.length}</div><div class="season-lbl">경기</div></div>
    </div>
  `;
}

function openPopup(idx) {
  const item = window._routineItems[idx];
  if (!item) return;
  document.getElementById('popup-name').textContent = item.name;
  document.getElementById('popup-sets').textContent = item.sets || '';
  document.getElementById('popup-points').innerHTML = (item.points||[]).map(p => `
    <div class="popup-point">
      <div class="popup-dot"></div>
      <p>${p}</p>
    </div>
  `).join('');
  document.getElementById('popup').classList.add('open');
}

function closePopup(e) {
  if (e.target === document.getElementById('popup')) {
    document.getElementById('popup').classList.remove('open');
  }
}

async function init() {
  const [routine, schedule, games] = await Promise.all([
    loadJSON('data/routine.json'),
    loadJSON('data/schedule.json'),
    loadJSON('data/games.json'),
  ]);
  renderCalendar(schedule);
  renderRoutine(routine);
  renderSeason(games);
}

init();
</script>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
  </svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
</script>
</body>
</html>
