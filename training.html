<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>
  (function() {
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>연습 정보 · 학균</title>
<style>
/* ── training 전용 ── */
.item-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: center;
  text-decoration: none; cursor: pointer; transition: background 0.15s;
}
.item-card:hover { background: var(--bg3); }
.item-card.available { border-color: rgba(255,79,123,0.3); }
.item-card.soon { opacity: 0.4; cursor: default; }
.item-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.item-desc { font-size: 11px; color: var(--text3); }
.item-arrow { font-size: 13px; color: var(--text3); }
.item-soon { font-size: 11px; color: var(--text3); }
</style>
</head>
<body>

<a class="back" href="index.html">← 허브로 돌아가기</a>
<div class="title-row">
  <h1 class="title">연습 정보</h1>
  <div class="dots">
    <div class="dot dot-mint"></div>
    <div class="dot dot-pink"></div>
    <div class="dot dot-yellow"></div>
  </div>
</div>
<div class="gradient-bar"></div>

<p class="category-label">타격</p>

<a class="item-card available" href="batting.html">
  <div class="item-left">
    <p class="item-name">타격 기본기 3가지</p>
    <p class="item-desc">Holding To Stride · Barrel · Cocking</p>
  </div>
  <span class="item-arrow">→</span>
</a>

<p class="category-label">투구</p>

<div class="item-card soon">
  <div class="item-left">
    <p class="item-name">투구 메커니즘</p>
    <p class="item-desc">준비중</p>
  </div>
  <span class="item-soon">곧 추가</span>
</div>

<p class="category-label">수비</p>

<div class="item-card soon">
  <div class="item-left">
    <p class="item-name">수비 루틴</p>
    <p class="item-desc">준비중</p>
  </div>
  <span class="item-soon">곧 추가</span>
</div>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
  </svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
</script>
</body>
</html>
