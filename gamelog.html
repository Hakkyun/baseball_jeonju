<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>경기일지 · 학균</title>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --text2: #aaa;
  --text3: #555;
  --mint: #3DD6A3;
  --pink: #FF4F7B;
  --yellow: #FFD600;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 48px 20px 40px;
  max-width: 480px;
  margin: 0 auto;
}
.back { font-size: 11px; color: var(--text3); margin-bottom: 12px; display: block; text-decoration: none; }
.back:hover { color: var(--text2); }
.title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.title { font-size: 22px; font-weight: 500; color: var(--text); }
.dots { display: flex; gap: 3px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-mint { background: var(--mint); }
.dot-pink { background: var(--pink); }
.dot-yellow { background: var(--yellow); }
.gradient-bar { height: 2px; background: linear-gradient(90deg, var(--mint), var(--pink), var(--yellow)); border-radius: 2px; margin-bottom: 20px; }

.season-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.tab-btn {
  padding: 4px 14px; border-radius: 20px; font-size: 11px; cursor: pointer;
  border: 0.5px solid var(--border); background: var(--bg3); color: var(--text3);
  transition: all 0.15s;
}
.tab-btn.active-p { background: rgba(61,214,163,0.1); border-color: rgba(61,214,163,0.3); color: var(--mint); }
.tab-btn.active-b { background: rgba(255,214,0,0.1); border-color: rgba(255,214,0,0.3); color: var(--yellow); }
.tab-btn.inactive { opacity: 0.35; cursor: default; }

.sg { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.sg + .sg { margin-top: 6px; }
.si { background: var(--bg3); border-radius: 8px; padding: 8px 4px; text-align: center; }
.sl { font-size: 9px; color: var(--text3); margin-bottom: 3px; }
.sv { font-size: 14px; font-weight: 500; color: var(--text); }
.sv.mint { color: var(--mint); }
.sv.yellow { color: var(--yellow); }
.sv.pink { color: var(--pink); }
.sv-sub { font-size: 11px; }

.games-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 8px; }
.game-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
.game-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; user-select: none; }
.game-header:active { background: var(--bg3); }
.game-date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.game-date { font-size: 13px; font-weight: 500; color: var(--text); }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
.badge-win { background: rgba(61,214,163,0.15); color: var(--mint); border: 0.5px solid rgba(61,214,163,0.3); }
.badge-lose { background: rgba(255,79,123,0.15); color: var(--pink); border: 0.5px solid rgba(255,79,123,0.3); }
.badge-draw { background: rgba(255,214,0,0.15); color: var(--yellow); border: 0.5px solid rgba(255,214,0,0.3); }
.badge-nd { background: rgba(170,170,170,0.1); color: var(--text2); border: 0.5px solid rgba(170,170,170,0.2); }
.game-opponent { font-size: 12px; color: var(--text3); }
.chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

.game-body { display: none; border-top: 0.5px solid var(--border); padding: 14px 16px 16px; }
.game-body.open { display: block; }

.fb-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.fb-card { background: var(--bg3); border-radius: 10px; padding: 12px; }
.fb-title { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; margin-bottom: 8px; }
.fb-text { font-size: 12px; color: var(--text2); line-height: 1.8; white-space: pre-line; }

.review-card { background: var(--bg3); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.review-item { margin-bottom: 12px; }
.review-item:last-child { margin-bottom: 0; }
.r-topic-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.s-icon { font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.s-O { color: var(--mint); }
.s-T { color: var(--yellow); }
.s-X { color: var(--pink); }
.r-topic { font-size: 12px; color: var(--text2); line-height: 1.6; }
.r-eval { font-size: 11px; color: var(--text3); margin-left: 18px; line-height: 1.6; }

.next-card { background: rgba(61,214,163,0.05); border: 0.5px solid rgba(61,214,163,0.3); border-radius: 10px; padding: 12px; }
.next-title { font-size: 10px; color: var(--mint); margin-bottom: 8px; }
.next-item { display: flex; gap: 8px; margin-bottom: 5px; }
.next-item:last-child { margin-bottom: 0; }
.next-num { font-size: 12px; color: var(--mint); font-weight: 500; flex-shrink: 0; }
.next-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
</style>
</head>
<body>

<a class="back" href="index.html">← 허브로 돌아가기</a>
<div class="title-row">
  <h1 class="title">경기일지</h1>
  <div class="dots">
    <div class="dot dot-mint"></div>
    <div class="dot dot-pink"></div>
    <div class="dot dot-yellow"></div>
  </div>
</div>
<div class="gradient-bar"></div>

<div class="season-box">
  <div class="tabs">
    <div class="tab-btn active-p" onclick="switchSeason('p',this)">투수</div>
    <div class="tab-btn" onclick="switchSeason('b',this)">타자</div>
  </div>
  <div id="season-grid"></div>
</div>

<p class="games-label" id="games-label"></p>
<div id="games-list"></div>

<script>
let _games = [];

async function loadJSON(p) { return (await fetch(p)).json(); }

function fmtDate(d) {
  const dt = new Date(d+'T00:00:00');
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}

function fmtRate(v) {
  if (v===null||v===undefined||isNaN(v)) return '-';
  return v.toFixed(3).replace(/^0/,'');
}

function teamBadge(r) {
  if (r==='win') return '<span class="badge badge-win">승</span>';
  if (r==='lose') return '<span class="badge badge-lose">패</span>';
  return '<span class="badge badge-draw">무</span>';
}

function decBadge(d) {
  if (!d) return '';
  if (d==='W') return '<span class="badge badge-win">학균 : 승</span>';
  if (d==='L') return '<span class="badge badge-lose">학균 : 패</span>';
  if (d==='S') return '<span class="badge badge-win">학균 : 세이브</span>';
  if (d==='ND') return '<span class="badge badge-nd">학균 : ND</span>';
  return '';
}

function sIcon(s) {
  const m = {O:['O','O'],T:['△','T'],X:['✕','X']};
  const [c,cls] = m[s]||['?','X'];
  return `<span class="s-icon s-${cls}">${c}</span>`;
}

function pColor(k,v) {
  if (k==='so') return v>=3?'mint':'';
  if (k==='bb') return v===0?'mint':v<=2?'yellow':'pink';
  if (k==='hbp') return v===0?'mint':v<=2?'yellow':'pink';
  if (k==='er') return v<=3?'mint':v<=6?'yellow':'pink';
  if (k==='hit') return v<=5?'':'pink';
  return '';
}

function bColor(k,v) {
  if (k==='avg') return v>=0.400?'mint':v>=0.300?'yellow':'pink';
  if (k==='obp') return v>=0.500?'mint':v>=0.400?'yellow':'pink';
  if (k==='slg') return v>=0.600?'mint':v>=0.500?'yellow':'pink';
  return '';
}

function eraColor(e) {
  return e<=5.00?'mint':e<=8.00?'yellow':'pink';
}

function renderSeasonP(games) {
  const pg = games.filter(g=>g.pitching);
  const tO = pg.reduce((s,g)=>s+(g.pitching.outs||0),0);
  const tER = pg.reduce((s,g)=>s+(g.pitching.er||0),0);
  const tR = pg.reduce((s,g)=>s+(g.pitching.r||0),0);
  const tSO = pg.reduce((s,g)=>s+(g.pitching.so||0),0);
  const tBB = pg.reduce((s,g)=>s+(g.pitching.bb||0),0);
  const tHBP = pg.reduce((s,g)=>s+(g.pitching.hbp||0),0);
  const tHit = pg.reduce((s,g)=>s+(g.pitching.hit||0),0);
  const W = pg.filter(g=>g.pitching.decision==='W').length;
  const L = pg.filter(g=>g.pitching.decision==='L').length;
  const S = pg.filter(g=>g.pitching.decision==='S').length;
  const iv = tO/3;
  const era = iv>0?(tER/iv*7):null;
  const eraC = era!==null?eraColor(era):'';
  const innF = `${Math.floor(tO/3)}.${tO%3}`;

  document.getElementById('season-grid').innerHTML = `
    <div class="sg">
      <div class="si"><div class="sl">경기</div><div class="sv">${pg.length}</div></div>
      <div class="si"><div class="sl">ERA</div><div class="sv ${eraC}">${era!==null?era.toFixed(2):'-'}</div></div>
      <div class="si"><div class="sl">승-패-세</div><div class="sv" style="font-size:12px;">${W}-${L}-${S}</div></div>
      <div class="si"><div class="sl">이닝</div><div class="sv">${innF}</div></div>
    </div>
    <div class="sg">
      <div class="si"><div class="sl">피안타</div><div class="sv">${tHit}</div></div>
      <div class="si"><div class="sl">사사구(HBP)</div><div class="sv">${tBB+tHBP}<span class="sv-sub">(${tHBP})</span></div></div>
      <div class="si"><div class="sl">삼진</div><div class="sv">${tSO}</div></div>
      <div class="si"><div class="sl">실점(자책)</div><div class="sv">${tR}<span class="sv-sub">(${tER})</span></div></div>
    </div>
  `;
}

function renderSeasonB(games) {
  const bg = games.filter(g=>g.batting);
  const tPA = bg.reduce((s,g)=>s+(g.batting.pa||0),0);
  const tAB = bg.reduce((s,g)=>s+(g.batting.ab||0),0);
  const tH = bg.reduce((s,g)=>s+(g.batting.hit||0),0);
  const tRBI = bg.reduce((s,g)=>s+(g.batting.rbi||0),0);
  const tBB = bg.reduce((s,g)=>s+(g.batting.bb||0),0);
  const tHBP = bg.reduce((s,g)=>s+(g.batting.hbp||0),0);
  const tSO = bg.reduce((s,g)=>s+(g.batting.so||0),0);
  const tSB = bg.reduce((s,g)=>s+(g.batting.sb||0),0);
  const t2B = bg.reduce((s,g)=>s+(g.batting.d||0),0);
  const t3B = bg.reduce((s,g)=>s+(g.batting.t||0),0);
  const tHR = bg.reduce((s,g)=>s+(g.batting.hr||0),0);
  const avg = tAB>0?tH/tAB:null;
  const obp = (tAB+tBB+tHBP)>0?(tH+tBB+tHBP)/(tAB+tBB+tHBP):null;
  const tb = tH+t2B+t3B*2+tHR*3;
  const slg = tAB>0?tb/tAB:null;

  document.getElementById('season-grid').innerHTML = `
    <div class="sg">
      <div class="si"><div class="sl">경기</div><div class="sv">${bg.length}</div></div>
      <div class="si"><div class="sl">타율</div><div class="sv ${avg!==null?bColor('avg',avg):''}">${fmtRate(avg)}</div></div>
      <div class="si"><div class="sl">출루율</div><div class="sv ${obp!==null?bColor('obp',obp):''}">${fmtRate(obp)}</div></div>
      <div class="si"><div class="sl">장타율</div><div class="sv ${slg!==null?bColor('slg',slg):''}">${fmtRate(slg)}</div></div>
    </div>
    <div class="sg">
      <div class="si"><div class="sl">안타</div><div class="sv">${tH}</div></div>
      <div class="si"><div class="sl">타점</div><div class="sv">${tRBI}</div></div>
      <div class="si"><div class="sl">사사구(HBP)</div><div class="sv">${tBB+tHBP}<span class="sv-sub">(${tHBP})</span></div></div>
      <div class="si"><div class="sl">삼진</div><div class="sv">${tSO}</div></div>
    </div>
  `;
}

function switchSeason(mode, el) {
  document.querySelectorAll('.season-box .tab-btn').forEach(t=>t.classList.remove('active-p','active-b'));
  el.classList.add(mode==='p'?'active-p':'active-b');
  mode==='p'?renderSeasonP(_games):renderSeasonB(_games);
}

function pitchBody(g, i) {
  if (!g.pitching) return '';
  const p = g.pitching;
  return `
    <div class="sg" style="margin-bottom:6px;">
      <div class="si"><div class="sl">이닝</div><div class="sv">${p.inn}</div></div>
      <div class="si"><div class="sl">투구수</div><div class="sv">${p.pitch}</div></div>
      <div class="si"><div class="sl">상대타자</div><div class="sv">${p.batters}</div></div>
      <div class="si"><div class="sl">피안타</div><div class="sv ${pColor('hit',p.hit)}">${p.hit}</div></div>
    </div>
    <div class="sg" style="margin-bottom:14px;">
      <div class="si"><div class="sl">볼넷</div><div class="sv ${pColor('bb',p.bb)}">${p.bb}</div></div>
      <div class="si"><div class="sl">사구</div><div class="sv ${pColor('hbp',p.hbp)}">${p.hbp}</div></div>
      <div class="si"><div class="sl">삼진</div><div class="sv ${pColor('so',p.so)}">${p.so}</div></div>
      <div class="si"><div class="sl">자책</div><div class="sv ${pColor('er',p.er)}">${p.er}</div></div>
    </div>
    <div class="fb-row">
      <div class="fb-card"><div class="fb-title">잘된 점</div><div class="fb-text">${p.good||''}</div></div>
      <div class="fb-card"><div class="fb-title">피드백</div><div class="fb-text">${p.feedback||''}</div></div>
    </div>
    ${p.review&&p.review.length?`
    <div class="review-card">
      <div class="fb-title" style="margin-bottom:10px;">지난 피드백 확인</div>
      ${p.review.map(r=>`
        <div class="review-item">
          <div class="r-topic-row">${sIcon(r.status)}<span class="r-topic">${r.topic}</span></div>
          <p class="r-eval">${r.eval}</p>
        </div>
      `).join('')}
    </div>`:''}
    ${p.next&&p.next.length?`
    <div class="next-card">
      <div class="next-title">다음 경기 목표</div>
      ${p.next.map((n,ni)=>`
        <div class="next-item"><span class="next-num">${ni+1}.</span><span class="next-text">${n}</span></div>
      `).join('')}
    </div>`:''}
  `;
}

function batBody(g, i) {
  if (!g.batting) return '';
  const b = g.batting;
  const avg = b.ab>0?b.hit/b.ab:null;
  const obp = (b.ab+b.bb+b.hbp)>0?(b.hit+b.bb+b.hbp)/(b.ab+b.bb+b.hbp):null;
  const tb = (b.hit||0)+(b.d||0)+(b.t||0)*2+(b.hr||0)*3;
  const slg = b.ab>0?tb/b.ab:null;
  const ops = obp!==null&&slg!==null?obp+slg:null;
  const pos = Array.isArray(b.position)?b.position.join('→'):b.position;

  return `
    <div style="font-size:10px;color:var(--text3);margin-bottom:10px;">포지션 · ${pos}</div>
    <div class="sg" style="margin-bottom:6px;">
      <div class="si"><div class="sl">타석</div><div class="sv">${b.pa}</div></div>
      <div class="si"><div class="sl">타수</div><div class="sv">${b.ab}</div></div>
      <div class="si"><div class="sl">안타</div><div class="sv">${b.hit}</div></div>
      <div class="si"><div class="sl">타점</div><div class="sv">${b.rbi}</div></div>
    </div>
    <div class="sg" style="margin-bottom:6px;">
      <div class="si"><div class="sl">득점</div><div class="sv">${b.run}</div></div>
      <div class="si"><div class="sl">사사구(HBP)</div><div class="sv">${b.bb+b.hbp}<span class="sv-sub">(${b.hbp})</span></div></div>
      <div class="si"><div class="sl">삼진</div><div class="sv">${b.so}</div></div>
      <div class="si"><div class="sl">도루</div><div class="sv">${b.sb}</div></div>
    </div>
    <div class="sg" style="margin-bottom:14px;">
      <div class="si"><div class="sl">타율</div><div class="sv ${avg!==null?bColor('avg',avg):''}">${fmtRate(avg)}</div></div>
      <div class="si"><div class="sl">출루율</div><div class="sv ${obp!==null?bColor('obp',obp):''}">${fmtRate(obp)}</div></div>
      <div class="si"><div class="sl">장타율</div><div class="sv ${slg!==null?bColor('slg',slg):''}">${fmtRate(slg)}</div></div>
      <div class="si"><div class="sl">OPS</div><div class="sv">${fmtRate(ops)}</div></div>
    </div>
    ${b.feedback?`
    <div class="fb-card" style="margin-bottom:0;">
      <div class="fb-title">피드백</div>
      <div class="fb-text">${b.feedback}</div>
    </div>`:''}
  `;
}

function switchRole(mode, i) {
  const pd = document.getElementById(`pd-${i}`);
  const bd = document.getElementById(`bd-${i}`);
  const pb = document.getElementById(`pb-${i}`);
  const bb = document.getElementById(`bb-${i}`);
  if (mode==='p') {
    pd.style.display='block'; if(bd) bd.style.display='none';
    pb.classList.add('active-p'); pb.classList.remove('active-b');
    bb.classList.remove('active-p','active-b');
  } else {
    if(pd) pd.style.display='none'; bd.style.display='block';
    bb.classList.add('active-b'); bb.classList.remove('active-p');
    pb.classList.remove('active-p','active-b');
  }
}

function pitchDecBadge(d) {
  if (!d) return '';
  if (d==='W') return '<span class="badge badge-win">투수 : 승</span>';
  if (d==='L') return '<span class="badge badge-lose">투수 : 패</span>';
  if (d==='S') return '<span class="badge badge-win">투수 : 세이브</span>';
  if (d==='ND') return '<span class="badge badge-nd">투수 : ND</span>';
  return '';
}

function batPosBadge(b) {
  if (!b) return '';
  const pos = Array.isArray(b.position) ? b.position.join('·') : b.position;
  return `<span class="badge" style="background:rgba(255,214,0,0.15);color:var(--yellow);border:0.5px solid rgba(255,214,0,0.3);">타자 : ${pos}</span>`;
}

function renderGames(games) {
  const sorted = [...games].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('games-label').textContent = `경기 기록 · ${games.length}경기`;
  document.getElementById('games-list').innerHTML = sorted.map((g,i) => {
    const hasPitch = !!g.pitching;
    const hasBat = !!g.batting;
    const defP = hasPitch;
    const bothExist = hasPitch && hasBat;
    return `
      <div class="game-card">
        <div class="game-header" onclick="toggleGame(${i})">
          <div>
            <div class="game-date-row">
              <span class="game-date">${fmtDate(g.date)}</span>
              ${teamBadge(g.teamResult)}
              ${hasPitch ? pitchDecBadge(g.pitching.decision) : ''}
              ${hasBat ? batPosBadge(g.batting) : ''}
            </div>
            <p class="game-opponent">vs ${g.opponent} · ${g.score}</p>
          </div>
          <span class="chevron" id="chev-${i}">▼</span>
        </div>
        <div class="game-body" id="body-${i}">
          ${bothExist ? `
          <div class="tabs" style="margin-bottom:14px;">
            <div id="pb-${i}" class="tab-btn ${defP?'active-p':''}" onclick="switchRole('p',${i})">투수</div>
            <div id="bb-${i}" class="tab-btn ${!defP?'active-b':''}" onclick="switchRole('b',${i})">타자</div>
          </div>` : ''}
          ${hasPitch?`<div id="pd-${i}" style="display:${defP?'block':'none'};">${pitchBody(g,i)}</div>`:''}
          ${hasBat?`<div id="bd-${i}" style="display:${!defP?'block':'none'};">${batBody(g,i)}</div>`:''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleGame(i) {
  document.getElementById(`body-${i}`).classList.toggle('open');
  document.getElementById(`chev-${i}`).classList.toggle('open');
}

async function init() {
  _games = await loadJSON('data/games.json');
  renderSeasonP(_games);
  renderGames(_games);
}

init();
</script>
</body>
</html>
