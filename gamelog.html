<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>경기일지 · 학균</title>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --text2: #aaa;
  --text3: #555;
  --mint: #3DD6A3;
  --pink: #FF4F7B;
  --yellow: #FFD600;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 48px 20px 40px;
  max-width: 480px;
  margin: 0 auto;
}

/* 헤더 */
.back { font-size: 11px; color: var(--text3); margin-bottom: 12px; display: block; text-decoration: none; }
.back:hover { color: var(--text2); }
.title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.title { font-size: 22px; font-weight: 500; color: var(--text); }
.dots { display: flex; gap: 3px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-mint { background: var(--mint); }
.dot-pink { background: var(--pink); }
.dot-yellow { background: var(--yellow); }
.gradient-bar { height: 2px; background: linear-gradient(90deg, var(--mint), var(--pink), var(--yellow)); border-radius: 2px; margin-bottom: 20px; }

/* 시즌 누적 */
.season-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 12px; }
.season-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.season-item { background: var(--bg3); border-radius: 10px; padding: 10px 6px; text-align: center; }
.season-val { font-size: 17px; font-weight: 500; color: var(--text); }
.season-val.mint { color: var(--mint); }
.season-val.yellow { color: var(--yellow); }
.season-val.pink { color: var(--pink); }
.season-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* 경기 카드 */
.games-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 8px; }
.game-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; cursor: pointer; user-select: none;
}
.game-header:active { background: var(--bg3); }
.game-left { }
.game-date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.game-date { font-size: 13px; font-weight: 500; color: var(--text); }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
.badge-win { background: rgba(61,214,163,0.15); color: var(--mint); border: 0.5px solid rgba(61,214,163,0.3); }
.badge-lose { background: rgba(255,79,123,0.15); color: var(--pink); border: 0.5px solid rgba(255,79,123,0.3); }
.badge-draw { background: rgba(255,214,0,0.15); color: var(--yellow); border: 0.5px solid rgba(255,214,0,0.3); }
.badge-nd { background: rgba(170,170,170,0.1); color: var(--text2); border: 0.5px solid rgba(170,170,170,0.2); }
.game-opponent { font-size: 12px; color: var(--text3); }
.chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

/* 경기 상세 */
.game-body { display: none; border-top: 0.5px solid var(--border); padding: 14px 16px 16px; }
.game-body.open { display: block; }

.stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
.stat-item { background: var(--bg3); border-radius: 8px; padding: 9px 4px; text-align: center; }
.stat-lbl { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.stat-val { font-size: 14px; font-weight: 500; color: var(--text); }
.stat-val.mint { color: var(--mint); }
.stat-val.pink { color: var(--pink); }
.stat-val.yellow { color: var(--yellow); }

.feedback-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.feedback-card { background: var(--bg3); border-radius: 10px; padding: 12px; }
.feedback-title { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; margin-bottom: 8px; }
.feedback-text { font-size: 12px; color: var(--text2); line-height: 1.8; white-space: pre-line; }

.review-card { background: var(--bg3); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.review-item { margin-bottom: 12px; }
.review-item:last-child { margin-bottom: 0; }
.review-topic-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.status-icon { font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.status-O { color: var(--mint); }
.status-T { color: var(--yellow); }
.status-X { color: var(--pink); }
.review-topic { font-size: 12px; color: var(--text2); line-height: 1.6; }
.review-eval { font-size: 11px; color: var(--text3); margin-left: 18px; line-height: 1.6; }

.next-card {
  background: rgba(61,214,163,0.05);
  border: 0.5px solid rgba(61,214,163,0.3);
  border-radius: 10px;
  padding: 12px;
}
.next-title { font-size: 10px; color: var(--mint); letter-spacing: 0.05em; margin-bottom: 8px; }
.next-items { display: flex; flex-direction: column; gap: 5px; }
.next-item { display: flex; gap: 8px; }
.next-num { font-size: 12px; color: var(--mint); font-weight: 500; flex-shrink: 0; }
.next-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
</style>
</head>
<body>

<a class="back" href="index.html">← 허브로 돌아가기</a>
<div class="title-row">
  <h1 class="title">경기일지</h1>
  <div class="dots">
    <div class="dot dot-mint"></div>
    <div class="dot dot-pink"></div>
    <div class="dot dot-yellow"></div>
  </div>
</div>
<div class="gradient-bar"></div>

<div class="season-box">
  <p class="section-label" id="season-label">2026 시즌 누적</p>
  <div class="season-grid" id="season-grid"></div>
</div>

<p class="games-label" id="games-label"></p>
<div id="games-list"></div>

<script>
async function loadJSON(path) {
  const res = await fetch(path);
  return res.json();
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}

function teamResultBadge(r) {
  if (r === 'win') return '<span class="badge badge-win">승</span>';
  if (r === 'lose') return '<span class="badge badge-lose">패</span>';
  return '<span class="badge badge-draw">무</span>';
}

function decisionBadge(d) {
  if (d === 'W') return '<span class="badge badge-win">학균 : 승</span>';
  if (d === 'L') return '<span class="badge badge-lose">학균 : 패</span>';
  if (d === 'S') return '<span class="badge badge-win">학균 : 세이브</span>';
  return '<span class="badge badge-nd">학균 : ND</span>';
}

function statusIcon(s) {
  const map = { O: ['O', 'O'], T: ['△', 'T'], X: ['✕', 'X'] };
  const [char, cls] = map[s] || ['?', 'X'];
  return `<span class="status-icon status-${cls}">${char}</span>`;
}

function renderSeason(games) {
  const totalOuts = games.reduce((s,g) => s + (g.outs||0), 0);
  const totalER = games.reduce((s,g) => s + (g.er||0), 0);
  const totalSO = games.reduce((s,g) => s + (g.so||0), 0);
  const totalBB = games.reduce((s,g) => s + (g.bb||0) + (g.hbp||0), 0);
  const totalHit = games.reduce((s,g) => s + (g.hit||0), 0);
  const wins = games.filter(g=>g.decision==='W').length;
  const losses = games.filter(g=>g.decision==='L').length;
  const saves = games.filter(g=>g.decision==='S').length;
  const innVal = totalOuts / 3;
  const era = innVal > 0 ? (totalER / innVal * 7).toFixed(2) : '-';
  const innFmt = `${Math.floor(totalOuts/3)}.${totalOuts%3}`;

  document.getElementById('season-label').textContent = `2026 시즌 누적 · ${games.length}경기`;
  document.getElementById('season-grid').innerHTML = `
    <div class="season-item"><div class="season-val" style="font-size:14px;">${wins}-${losses}-${saves}</div><div class="season-lbl">승-패-세</div></div>
    <div class="season-item"><div class="season-val">${innFmt}</div><div class="season-lbl">이닝</div></div>
    <div class="season-item"><div class="season-val yellow">${era}</div><div class="season-lbl">ERA</div></div>
    <div class="season-item"><div class="season-val mint">${totalSO}</div><div class="season-lbl">삼진</div></div>
    <div class="season-item"><div class="season-val">${totalBB}</div><div class="season-lbl">4사구</div></div>
    <div class="season-item"><div class="season-val">${totalHit}</div><div class="season-lbl">피안타</div></div>
  `;
}

function renderGames(games) {
  const sorted = [...games].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('games-label').textContent = `경기 기록 · ${games.length}경기`;
  document.getElementById('games-list').innerHTML = sorted.map((g, i) => `
    <div class="game-card">
      <div class="game-header" onclick="toggleGame(${i})">
        <div class="game-left">
          <div class="game-date-row">
            <span class="game-date">${formatDate(g.date)}</span>
            ${teamResultBadge(g.teamResult)}
            ${decisionBadge(g.decision)}
          </div>
          <p class="game-opponent">vs ${g.opponent} · ${g.score}</p>
        </div>
        <span class="chevron" id="chev-${i}">▼</span>
      </div>
      <div class="game-body" id="body-${i}">
        <div class="stat-grid">
          <div class="stat-item"><div class="stat-lbl">이닝</div><div class="stat-val">${g.inn}</div></div>
          <div class="stat-item"><div class="stat-lbl">투구수</div><div class="stat-val">${g.pitch}</div></div>
          <div class="stat-item"><div class="stat-lbl">삼진</div><div class="stat-val mint">${g.so}</div></div>
          <div class="stat-item"><div class="stat-lbl">4사구</div><div class="stat-val">${g.bb + g.hbp}</div></div>
          <div class="stat-item"><div class="stat-lbl">자책</div><div class="stat-val ${g.er <= 1 ? 'mint' : g.er <= 3 ? 'yellow' : 'pink'}">${g.er}</div></div>
        </div>
        <div class="feedback-row">
          <div class="feedback-card">
            <div class="feedback-title">잘된 점</div>
            <div class="feedback-text">${g.good}</div>
          </div>
          <div class="feedback-card">
            <div class="feedback-title">피드백</div>
            <div class="feedback-text">${g.feedback}</div>
          </div>
        </div>
        ${g.review && g.review.length ? `
        <div class="review-card">
          <div class="feedback-title" style="margin-bottom:10px;">지난 피드백 확인</div>
          ${g.review.map(r => `
            <div class="review-item">
              <div class="review-topic-row">
                ${statusIcon(r.status)}
                <span class="review-topic">${r.topic}</span>
              </div>
              <p class="review-eval">${r.eval}</p>
            </div>
          `).join('')}
        </div>` : ''}
        ${g.next && g.next.length ? `
        <div class="next-card">
          <div class="next-title">다음 경기 목표</div>
          <div class="next-items">
            ${g.next.map((n, ni) => `
              <div class="next-item">
                <span class="next-num">${ni+1}.</span>
                <span class="next-text">${n}</span>
              </div>
            `).join('')}
          </div>
        </div>` : ''}
      </div>
    </div>
  `).join('');
}

function toggleGame(i) {
  const body = document.getElementById(`body-${i}`);
  const chev = document.getElementById(`chev-${i}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

async function init() {
  const games = await loadJSON('data/games.json');
  renderSeason(games);
  renderGames(games);
}

init();
</script>
</body>
</html>
